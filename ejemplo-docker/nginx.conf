server {
    listen       80;
    server_name  malla.isoftesan.dev;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión para el HTML (único archivo, pero pesa ~85KB)
    gzip            on;
    gzip_types      text/html text/css application/javascript;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache corto para poder actualizar la malla sin esperas largas
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
